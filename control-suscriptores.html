<style>
  :root{
    --bg:#0c0c0c;
    --panel:#151310;
    --panel2:#1c1914;
    --gold:#c9a84c;
    --gold-soft:rgba(201,168,76,0.15);
    --border:rgba(201,168,76,0.22);
    --white:#f2ede0;
    --muted:#8a8375;
    --red:#c94f4f;
    --red-bg:rgba(201,79,79,0.14);
    --green:#5fae72;
    --green-bg:rgba(95,174,114,0.12);
    --amber:#c99a4c;
    --amber-bg:rgba(201,154,76,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(1200px 600px at 50% -10%, #1a1712 0%, var(--bg) 60%);
    color:var(--white);
    font-family:Arial, Helvetica, sans-serif;
    padding:24px 16px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:28px;
    border-bottom:1px solid var(--border);
    padding-bottom:20px;
  }
  .brand{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin:0 0 6px;}
  h1{margin:0;font-size:26px;font-weight:700;letter-spacing:.3px;}
  .stats{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:10px 16px;
    min-width:104px;
    text-align:center;
  }
  .stat .n{font-size:20px;font-weight:700;}
  .stat .l{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .stat.warn .n{color:var(--red);}
  .stat.ok .n{color:var(--green);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .btn{
    background:var(--gold);
    color:#151005;
    border:none;
    padding:11px 22px;
    border-radius:5px;
    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;
    cursor:pointer;
    text-transform:uppercase;
  }
  .btn:hover{opacity:.88;}
  .btn.secondary{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--border);
  }
  .search{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--white);
    padding:10px 14px;
    border-radius:5px;
    font-size:14px;
    min-width:220px;
  }
  .search::placeholder{color:var(--muted);}

  /* Vista de tabla (escritorio) */
  .table-wrap{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;min-width:920px;}
  th{
    text-align:left;
    font-size:10.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--gold);
    padding:14px 12px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  td{
    padding:13px 12px;
    font-size:13.5px;
    border-bottom:1px solid rgba(201,168,76,0.08);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(201,168,76,0.04);}
  .pill{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.3px;
  }
  .pill.activo{background:var(--green-bg);color:var(--green);}
  .pill.cancelado{background:rgba(150,150,150,0.15);color:var(--muted);}
  .pill.pendiente{background:var(--amber-bg);color:var(--amber);}
  .days{font-weight:700;}
  .days.urgent{color:var(--red);}
  .days.soon{color:var(--amber);}
  .days.fine{color:var(--green);}
  .row-actions{display:flex;gap:8px;}
  .icon-btn{
    background:none;border:1px solid var(--border);color:var(--muted);
    border-radius:4px;padding:6px 9px;cursor:pointer;font-size:12px;
  }
  .icon-btn:hover{color:var(--gold);border-color:var(--gold);}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty b{color:var(--white);display:block;margin-bottom:6px;font-size:15px;}

  /* Vista de tarjetas (móvil) */
  .cards{display:none;flex-direction:column;gap:12px;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:16px;
  }
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .card-top .name{font-size:15px;font-weight:700;}
  .card-top .plan{font-size:12px;color:var(--muted);margin-top:2px;}
  .card-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid rgba(201,168,76,0.08);}
  .card-row .l{color:var(--muted);}
  .card-actions{display:flex;gap:8px;margin-top:12px;}
  .card-actions .icon-btn{flex:1;text-align:center;}

  @media (max-width:760px){
    .table-wrap{display:none;}
    .cards{display:flex;}
    h1{font-size:21px;}
    .stat{min-width:90px;padding:8px 12px;}
  }

  /* Modal */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
    z-index:50;align-items:center;justify-content:center;padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:10px;
    width:100%;max-width:480px;
    padding:26px;
    max-height:90vh;overflow-y:auto;
  }
  .modal h2{margin:0 0 18px;font-size:17px;color:var(--gold);}
  .modal-close{
    background:none;
    border:1px solid var(--border);
    color:var(--muted);
    width:30px;height:30px;
    border-radius:6px;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
  }
  .modal-close:hover{color:var(--gold);border-color:var(--gold);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%;
    background:#0f0d0a;
    border:1px solid var(--border);
    color:var(--white);
    padding:10px 12px;
    border-radius:5px;
    font-size:14px;
    font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:50px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .btn.danger{background:transparent;color:var(--red);border:1px solid rgba(201,79,79,0.4);}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:30px;}
</style>
</head>

        <input type="text" id="f_nombre" required>

      <div class="field">
        <label>Contacto (email / usuario Discord)</label>
        <input type="text" id="f_contacto">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Plan</label>
          <select id="f_plan">
            <option>Comunidad Discord privada</option>
            <option>Suite de indicadores</option>
            <option>Mentoría 1 a 1</option>
          </select>
        </div>
        <div class="field">
          <label>Precio (€/mes)</label>
          <input type="number" id="f_precio" value="79" step="1">
        </div>

        </div>
      </div>

        <select id="f_estado">
          <option>Activo</option>
          <option>Pago pendiente</option>

        <button type="button" class="btn secondary" onclick="closeModal()">Cancelar</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEmZv5dprl_x0YF-2o11V9ubC2at4756c",
  authDomain: "mdm-trading-suscriptores.firebaseapp.com",
  projectId: "mdm-trading-suscriptores",
  storageBucket: "mdm-trading-suscriptores.firebasestorage.app",
  messagingSenderId: "146116742311",
  appId: "1:146116742311:web:164c5d78530eb0e7cb1f82",
  measurementId: "G-223C1RLW4G"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const subscribersCol = db.collection("subscribers");

let subs = [];

// Escucha en tiempo real: cualquier cambio (desde este dispositivo u otro) actualiza la tabla al instante
subscribersCol.onSnapshot((snapshot) => {
  subs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}, (error) => {
  console.error("Error de conexión con Firestore:", error);
  document.getElementById('tableBody').innerHTML =
    `<tr><td colspan="10"><div class="empty"><b>Sin conexión con la base de datos</b>Revisa tu conexión a internet o las reglas de Firestore.</div></td></tr>`;
});

function addMonths(dateStr, months){
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + months);
  return d;
}

function daysUntil(dateObj){
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((dateObj - today) / (1000*60*60*24));
  return diff;
}

function fmtDate(d){
  return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function estadoPillClass(estado){
  if(estado === 'Activo') return 'activo';
  if(estado === 'Cancelado') return 'cancelado';
  return 'pendiente';
}

function daysClass(days){
  if(days <= 3) return 'urgent';
  if(days <= 10) return 'soon';
  return 'fine';
}

function render(){
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = subs.filter(s =>
    s.nombre.toLowerCase().includes(q) || (s.contacto||'').toLowerCase().includes(q)
  );

  // Stats
  const activos = subs.filter(s => s.estado === 'Activo').length;
  const urgentes = subs.filter(s => {
    if(s.estado !== 'Activo' || !s.ultimopago) return false;
    const renov = addMonths(s.ultimopago, 1);
    return daysUntil(renov) <= 3;
  }).length;
  const mrr = subs.filter(s => s.estado === 'Activo').reduce((a,s) => a + (Number(s.precio)||0), 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${subs.length}</div><div class="l">Total</div></div>
    <div class="stat ok"><div class="n">${activos}</div><div class="l">Activos</div></div>
    <div class="stat warn"><div class="n">${urgentes}</div><div class="l">Renuevan ≤3d</div></div>
    <div class="stat"><div class="n">${mrr}€</div><div class="l">MRR</div></div>
  `;

  const tbody = document.getElementById('tableBody');
  const cardsView = document.getElementById('cardsView');

  if(filtered.length === 0){
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty"><b>No hay suscriptores todavía</b>Añade el primero con el botón de arriba.</div></td></tr>`;
    cardsView.innerHTML = `<div class="empty"><b>No hay suscriptores todavía</b>Añade el primero con el botón de arriba.</div>`;
    return;
  }

  let rowsHtml = '';
  let cardsHtml = '';

  filtered
    .slice()
    .sort((a,b) => new Date(a.ultimopago) - new Date(b.ultimopago))
    .forEach(s => {
      const renov = s.ultimopago ? addMonths(s.ultimopago, 1) : null;
      const dias = renov ? daysUntil(renov) : null;
      const dClass = dias !== null ? daysClass(dias) : '';
      const pillClass = estadoPillClass(s.estado);

      rowsHtml += `
        <tr onclick="openModal('${s.id}')" style="cursor:pointer">
          <td><b>${escapeHtml(s.nombre)}</b></td>
          <td>${escapeHtml(s.contacto||'—')}</td>
          <td>${escapeHtml(s.plan)}</td>
          <td>${s.precio}€</td>
          <td>${s.alta ? fmtDate(new Date(s.alta+'T00:00:00')) : '—'}</td>
          <td>${s.ultimopago ? fmtDate(new Date(s.ultimopago+'T00:00:00')) : '—'}</td>
          <td>${renov ? fmtDate(renov) : '—'}</td>
          <td class="days ${dClass}">${dias !== null ? dias + 'd' : '—'}</td>
          <td><span class="pill ${pillClass}">${s.estado}</span></td>
          <td onclick="event.stopPropagation()"><div class="row-actions"><button class="icon-btn" onclick="openModal('${s.id}')">Editar</button></div></td>
        </tr>
      `;

      cardsHtml += `
        <div class="card" onclick="openModal('${s.id}')">
          <div class="card-top">
            <div>
              <div class="name">${escapeHtml(s.nombre)}</div>
              <div class="plan">${escapeHtml(s.plan)}</div>
            </div>
            <span class="pill ${pillClass}">${s.estado}</span>
          </div>
          <div class="card-row"><span class="l">Precio</span><span>${s.precio}€/mes</span></div>
          <div class="card-row"><span class="l">Último pago</span><span>${s.ultimopago ? fmtDate(new Date(s.ultimopago+'T00:00:00')) : '—'}</span></div>
          <div class="card-row"><span class="l">Renovación</span><span>${renov ? fmtDate(renov) : '—'}</span></div>
          <div class="card-row"><span class="l">Días restantes</span><span class="days ${dClass}">${dias !== null ? dias + 'd' : '—'}</span></div>
        </div>
      `;
    });

  tbody.innerHTML = rowsHtml;
  cardsView.innerHTML = cardsHtml;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openModal(id){
  document.getElementById('subForm').reset();
  document.getElementById('subId').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('modalTitle').textContent = 'Añadir suscriptor';

  if(id){
    const s = subs.find(x => x.id === id);
    if(s){
      document.getElementById('subId').value = s.id;
      document.getElementById('f_nombre').value = s.nombre;
      document.getElementById('f_contacto').value = s.contacto || '';
      document.getElementById('f_plan').value = s.plan;
      document.getElementById('f_precio').value = s.precio;
      document.getElementById('f_alta').value = s.alta || '';
      document.getElementById('f_ultimopago').value = s.ultimopago || '';
      document.getElementById('f_estado').value = s.estado;
      document.getElementById('f_notas').value = s.notas || '';
      document.getElementById('modalTitle').textContent = 'Editar suscriptor';
      document.getElementById('deleteBtn').style.display = 'inline-block';
    }
  } else {
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('f_alta').value = today;
    document.getElementById('f_ultimopago').value = today;
  }

  document.getElementById('overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}

async function saveSub(e){
  e.preventDefault();
  const id = document.getElementById('subId').value || ('s' + Date.now());
  const data = {
    nombre: document.getElementById('f_nombre').value.trim(),
    contacto: document.getElementById('f_contacto').value.trim(),
    plan: document.getElementById('f_plan').value,
    precio: Number(document.getElementById('f_precio').value) || 0,
    alta: document.getElementById('f_alta').value,
    ultimopago: document.getElementById('f_ultimopago').value,
    estado: document.getElementById('f_estado').value,
    notas: document.getElementById('f_notas').value.trim(),
  };

  try{
    await subscribersCol.doc(id).set(data);
    closeModal();
  }catch(err){
    alert('No se pudo guardar: revisa tu conexión a internet.');
    console.error(err);
  }
  return false;
}

async function deleteSub(){
  const id = document.getElementById('subId').value;
  if(!id) return;
  if(!confirm('¿Eliminar este suscriptor?')) return;
  try{
    await subscribersCol.doc(id).delete();
    closeModal();
  }catch(err){
    alert('No se pudo eliminar: revisa tu conexión a internet.');
    console.error(err);
  }
}

// El modal solo se cierra con el botón X, no al hacer clic fuera.

// Exponer al scope global para los onclick/onsubmit del HTML (necesario por usar type="module")
window.openModal = openModal;
window.closeModal = closeModal;
window.saveSub = saveSub;
window.deleteSub = deleteSub;
window.render = render;
</script>
<script>
  // Registra el service worker (necesario para que Chrome permita "Instalar app").
  // Solo funciona si la página se sirve por https — en local (file://) no hace nada, sin dar error.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW no registrado:', err));
  }
</script>
